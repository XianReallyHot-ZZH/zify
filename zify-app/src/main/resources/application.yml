server:
  port: 8080

spring:
  application:
    name: zify
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:mysql://localhost:3306/zify?characterEncoding=utf-8&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379

zify:
  upload:
    dir: ${UPLOAD_DIR:/data/uploads}
    max-size: 100MB
  security:
    encryption-key: ${ZIFY_ENCRYPTION_KEY:my-secret-key-for-aes-encryption-2026}
  llm:
    provider-defaults:
      max-concurrent: 20
      acquire-timeout: 2s
  external-call:
    connect-timeout: 10s
    read-timeout: 60s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zify.**.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"
  level:
    root: info
    com.zify: debug
