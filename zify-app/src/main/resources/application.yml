server:
  port: 8080

spring:
  application:
    name: zify
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      # Spring AI 的 ChatModel 由 model 模块程序化构造（Provider 配置在 DB），
      # 排除 starter 按 spring.ai.openai.* / spring.ai.anthropic.* 的自动装配。
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:mysql://localhost:3306/zify?characterEncoding=utf-8&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379

zify:
  upload:
    dir: ${UPLOAD_DIR:/data/uploads}
    max-size: 100MB
  security:
    encryption-key: ${ZIFY_ENCRYPTION_KEY:my-secret-key-for-aes-encryption-2026}
  llm:
    provider-defaults:
      max-concurrent: 20
      acquire-timeout: 2s
    timeout:
      chat-stream:
        connect: 10s
        first-token: 30s
        idle: 45s
        total: 120s
  chat:
    context:
      default-window: 128000
      budget-threshold: 0.75
      compaction-batch: 6
      max-input-tokens: 30000
      summary-overhead-tokens: 2000
  external-call:
    connect-timeout: 10s
    read-timeout: 60s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zify.**.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"
  level:
    root: info
    com.zify: debug
