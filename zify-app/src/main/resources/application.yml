server:
  port: 8080

spring:
  application:
    name: zify
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      # Spring AI 的所有模型由 model 模块程序化构造（Provider 配置在 DB），
      # 排除 starter 按 spring.ai.openai.* / spring.ai.anthropic.* 自动装配各模型 Bean
      # （ChatModel / Embedding / Image / Audio / Moderation 均需 apiKey，DB 配置下不能让 starter 自动建）。
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:mysql://localhost:3306/zify?characterEncoding=utf-8&serverTimezone=UTC
    username: root
#    password: 123456
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379

zify:
  upload:
    dir: ${UPLOAD_DIR:/data/uploads}
    max-size: 100MB
  security:
    encryption-key: ${ZIFY_ENCRYPTION_KEY:my-secret-key-for-aes-encryption-2026}
  llm:
    provider-defaults:
      max-concurrent: 20
      acquire-timeout: 2s
    timeout:
      chat-stream:
        connect: 10s
        first-token: 30s
        idle: 45s
        total: 120s
  chat:
    context:
      default-window: 128000
      budget-threshold: 0.75
      compaction-batch: 6
      max-input-tokens: 30000
      summary-overhead-tokens: 2000
    react:                               # ReAct 多轮循环控制（glm-docs/13 §C4）
      max-turns: 10
      loop-deadline: 120s
      dup-tool-call-threshold: 3
  tool:                                  # 工具调用（glm-docs/13 §四–§八）
    timeout:
      connect: 10s
      mcp-handshake: 15s
      request-default: 30s               # tool.timeout_seconds 未设时兜底
      total-cap: 60s
    circuit-breaker:
      failure-threshold: 5
      open-duration: 60s
    executor:
      max-concurrent: 50                 # 全局 Semaphore
    security:
      ssrf:
        enabled: true                    # SSRF 黑名单开关
        allow-private: false             # 是否允许内网（内网部署可开）
      response-max-bytes: 32768          # 响应截断阈值 32KB
      request-max-bytes: 1048576         # 请求体上限 1MB
  external-call:
    connect-timeout: 10s
    read-timeout: 60s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zify.**.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"
  level:
    root: info
    com.zify: debug
